<!DOCTYPE html>
<html>
<head>
<title>eFootball Arena CI 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0a3d0a;color:white;text-align:center;font-family:sans-serif}
h2{margin:10px;color:orange}
canvas{border:3px solid white;background:#0a3d0a}
button{padding:12px 20px;margin:8px;background:orange;color:black;border:none;border-radius:5px;font-weight:bold}
#ad{width:320px;height:50px;background:#333;margin:10px auto;line-height:50px}
</style>
</head>
<body>
<h2>⚽ eFootball Arena CI 2026</h2>
<p>Coins: <span id="coins">0</span> | Score: <span id="score">0-0</span></p>
<canvas id="game" width="320" height="400"></canvas>
<br>
<button onclick="watchAd()">Watch Ad +50 Coins</button>
<div id="ad">Banner Ad Here</div>
<script>
let coins=0, score1=0, score2=0;
const canvas=document.getElementById('game');
const c=canvas.getContext('2d');
let ball={x:160,y:200,r:8,dx:2,dy:2};
let p1={x:20,y:180}, p2={x:300,y:180};

function draw(){
  c.fillStyle='#0a3d0a'; c.fillRect(0,0,320,400);
  c.fillStyle='white'; c.fillRect(158,0,4,400); // middle line
  c.beginPath(); c.arc(ball.x,ball.y,ball.r,0,Math.PI*2); c.fill(); // ball
  c.fillStyle='blue'; c.fillRect(p1.x,p1.y,10,30); // player 1
  c.fillStyle='red'; c.fillRect(p2.x,p2.y,10,30); // player 2
  ball.x+=ball.dx; ball.y+=ball.dy;
  if(ball.y<0||ball.y>400) ball.dy*=-1;
  if(ball.x<0){score2++; reset();} if(ball.x>320){score1++; reset();}
  document.getElementById('score').innerText=score1+'-'+score2;
  requestAnimationFrame(draw);
}
function reset(){ball.x=160; ball.y=200; ball.dx*=-1;}
function watchAd(){coins+=50; document.getElementById('coins').innerText=coins; alert('+50 coins!')}
draw();
</script>
</body>
</html>
